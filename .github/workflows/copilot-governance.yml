name: Copilot Governance Check

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 计算变更范围
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              echo "base=$(git rev-list --max-parents=0 HEAD)" >> "$GITHUB_OUTPUT"
            else
              echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            fi
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 执行治理规则检查
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ steps.range.outputs.base }}"
          HEAD_SHA="${{ steps.range.outputs.head }}"

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          echo "本次变更文件："
          echo "$CHANGED_FILES"

          # 约束联动：规则文件变更必须伴随治理工作流变更，防止规则与校验脚本漂移。
          if echo "$CHANGED_FILES" | grep -qx ".github/copilot-instructions.md"; then
            if ! echo "$CHANGED_FILES" | grep -qx ".github/workflows/copilot-governance.yml"; then
              echo "错误：修改 .github/copilot-instructions.md 时必须同步修改 .github/workflows/copilot-governance.yml"
              exit 1
            fi
          fi

          if git diff --name-status "$BASE_SHA" "$HEAD_SHA" | awk '$1=="A" || $1=="D" {print $2}' | grep -q .; then
            if ! echo "$CHANGED_FILES" | grep -qx "README.md"; then
              echo "错误：检测到新增/删除文件，但 README.md 未同步更新。"
              exit 1
            fi
          fi

          python3 - <<'PY'
          import json
          import pathlib
          import re
          import subprocess
          import sys
          import xml.etree.ElementTree as ET

          instructions_path = pathlib.Path(".github/copilot-instructions.md")
          instructions_text = instructions_path.read_text(encoding="utf-8")
          
          second_person_base_pattern = r"(?<![\u4e00-\u9fffA-Za-z0-9_])(你们|你)(?![\u4e00-\u9fffA-Za-z0-9_])"
          second_person_inline_comment_pattern = re.compile(rf"(///.*{second_person_base_pattern})|(//.*{second_person_base_pattern})", re.MULTILINE)
          second_person_block_comment_pattern = re.compile(rf"/\*[\s\S]*?{second_person_base_pattern}[\s\S]*?\*/", re.MULTILINE)
          plan_rule_pattern = re.compile(
              r"删除\s*`?Oracle到SQLServer同步实施计划\.md`?.{0,120}?通读相关代码.{0,120}?已完全实现",
              re.DOTALL,
          )
          if not plan_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少实施计划条目删除前通读代码校验的强制约束。")
              sys.exit(1)

          config_comment_rule_pattern = re.compile(
              r"所有配置项必须有中文注释",
              re.DOTALL,
          )
          if not config_comment_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“所有配置项必须有中文注释”的强制约束。")
              sys.exit(1)
          
          config_file_comment_rule_pattern = re.compile(
              r"配置文件（如\s*`?appsettings\*\.json`?）的每一项都需要注释.*?JSON\s*注释风格",
              re.DOTALL,
          )
          if not config_file_comment_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“配置文件每一项都需要注释”的强制约束。")
              sys.exit(1)

          array_sample_rule_pattern = re.compile(
              r"配置项为集合类型（数组）.*?至少.*?一个示例元素",
              re.DOTALL,
          )
          if not array_sample_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“集合配置项至少一个示例元素”的强制约束。")
              sys.exit(1)

          enum_dir_rule_pattern = re.compile(
              r"所有枚举必须定义在\s*`?EverydayChain\.Hub\.Domain\.Enums`?\s*子目录下",
              re.DOTALL,
          )
          if not enum_dir_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“枚举目录约束”。")
              sys.exit(1)

          option_dir_rule_pattern = re.compile(
              r"所有配置实体类必须定义在\s*`?EverydayChain\.Hub\.Domain\.Options`?\s*子目录下",
              re.DOTALL,
          )
          if not option_dir_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“配置实体目录约束”。")
              sys.exit(1)

          aggregate_dir_rule_pattern = re.compile(
              r"聚合根只能定义在\s*`?Aggregates`?\s*子目录下",
              re.DOTALL,
          )
          if not aggregate_dir_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“聚合根目录约束”。")
              sys.exit(1)

          event_dir_rule_pattern = re.compile(
              r"所有事件必须定义在\s*`?EverydayChain\.Hub\.Domain\.Events`?\s*子目录下",
              re.DOTALL,
          )
          if not event_dir_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“事件目录约束”。")
              sys.exit(1)

          utility_dir_rule_pattern = re.compile(
              r"静态工具类只能定义在\s*`?EverydayChain\.Hub\.SharedKernel\.Utilities`?\s*子目录下",
              re.DOTALL,
          )
          if not utility_dir_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“静态工具类目录约束”。")
              sys.exit(1)
          
          polly_rule_pattern = re.compile(
              r"重试策略需要使用\s*`?Polly`?\s*库",
              re.DOTALL,
          )
          if not polly_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“重试策略需要使用 Polly 库”的强制约束。")
              sys.exit(1)
          
          host_services_rule_pattern = re.compile(
              r"Host\s*层禁止使用\s*`?Servers`?\s*目录命名.*?统一使用\s*`?Services`?",
              re.DOTALL,
          )
          if not host_services_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“Host 层 Servers -> Services 命名约束”。")
              sys.exit(1)

          log_rotation_rule_pattern = re.compile(
              r"单个日志文件大小上限为\s*10\s*MB.*?archiveAboveSize.*?10485760",
              re.DOTALL,
          )
          if not log_rotation_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少“单个日志文件大小上限 10 MB 轮转”的强制约束。")
              sys.exit(1)

          ddd_dependency_rule_pattern = re.compile(
              r"Host\s*->\s*Infrastructure\s*->\s*Application\s*->\s*Domain",
              re.DOTALL,
          )
          if not ddd_dependency_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少 DDD 依赖方向强制约束。")
              sys.exit(1)

          persistence_abstraction_rule_pattern = re.compile(
              r"EverydayChain\.Hub\.Application/Abstractions/Persistence",
              re.DOTALL,
          )
          if not persistence_abstraction_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少 Application 持久化抽象目录约束。")
              sys.exit(1)

          unit_of_work_rule_pattern = re.compile(
              r"IUnitOfWork[\s\S]*?Application/Abstractions/Persistence",
              re.DOTALL,
          )
          if not unit_of_work_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少 IUnitOfWork 放置约束。")
              sys.exit(1)

          query_rule_pattern = re.compile(
              r"Application/Abstractions/Queries",
              re.DOTALL,
          )
          if not query_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少 Query/Read 抽象放置约束。")
              sys.exit(1)

          integration_rule_pattern = re.compile(
              r"Application/Abstractions/Integrations",
              re.DOTALL,
          )
          if not integration_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少 Integrations 抽象放置约束。")
              sys.exit(1)

          protocol_rule_pattern = re.compile(
              r"Infrastructure/Devices/Protocols",
              re.DOTALL,
          )
          if not protocol_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少协议编解码放置约束。")
              sys.exit(1)

          no_parallel_migration_rule_pattern = re.compile(
              r"迁移过程中禁止新旧目录并存",
              re.DOTALL,
          )
          if not no_parallel_migration_rule_pattern.search(instructions_text):
              print("错误：.github/copilot-instructions.md 缺少迁移禁止新旧并存约束。")
              sys.exit(1)

          # 校验 nlog.config 中 archiveAboveSize 不超过 10 MB（10485760 字节）
          # 注意：此处提前声明 _nlog_ignored_dirs 以避免依赖后续定义的 ignored_dirs
          _nlog_ignored_dirs = {"bin", "obj", ".git"}
          nlog_configs = list(pathlib.Path(".").rglob("nlog.config"))
          for nlog_path in nlog_configs:
              if any(part in _nlog_ignored_dirs for part in nlog_path.parts):
                  continue
              try:
                  tree = ET.parse(nlog_path)
              except ET.ParseError as exc:
                  print(f"错误：{nlog_path.as_posix()} 解析失败（{exc}），请修复后重新提交。")
                  sys.exit(1)
              ns = "http://www.nlog-project.org/schemas/NLog.xsd"
              for target in tree.findall(f".//{{{ns}}}target") + tree.findall(".//target"):
                  target_type = target.get("xsi:type") or target.get("{http://www.w3.org/2001/XMLSchema-instance}type") or target.get("type", "")
                  if not target_type or target_type.lower() != "file":
                      continue
                  target_name = target.get("name", "<未命名>")
                  archive_size_str = target.get("archiveAboveSize")
                  if archive_size_str is None:
                      print(f"错误：{nlog_path.as_posix()} 的 File target '{target_name}' 缺少 archiveAboveSize 属性，必须设置且不超过 10 MB（10485760）。")
                      sys.exit(1)
                  try:
                      archive_size = int(archive_size_str)
                  except ValueError:
                      print(f"错误：{nlog_path.as_posix()} 的 File target '{target_name}' archiveAboveSize 值非整数：{archive_size_str}。")
                      sys.exit(1)
                  if archive_size > 10485760:
                      print(f"错误：{nlog_path.as_posix()} 的 archiveAboveSize={archive_size} 超过 10 MB 上限（10485760）。")
                      sys.exit(1)

          banned_patterns = [
              r"\bDateTime\.UtcNow\b",
              r"\bDateTimeOffset\.UtcNow\b",
              r"\bDateTimeKind\.Utc\b",
              r"\bToUniversalTime\s*\(",
              r"\bUtcDateTime\b",
              r"\bDateTimeStyles\.AssumeUniversal\b",
              r"\bDateTimeStyles\.AdjustToUniversal\b",
          ]
          banned_regex = re.compile("|".join(banned_patterns))

          ignored_dirs = {"bin", "obj", ".git"}
          ignored_files = {
              ".github/copilot-instructions.md",
              ".github/workflows/copilot-governance.yml",
          }
          git_tracked_files = subprocess.check_output(["git", "ls-files", "-z"], text=False)
          candidate_files = [pathlib.Path(item) for item in git_tracked_files.decode("utf-8").split("\0") if item]

          utc_violations = []
          for path in candidate_files:
              relative = path.as_posix()
              if relative in ignored_files:
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              # Markdown 文档允许出现禁用 API 名称作为规则说明示例，因此不纳入扫描。
              if path.suffix not in {".cs", ".csproj", ".json", ".yml", ".yaml", ".xml", ".config"}:
                  continue
              try:
                  content = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              if banned_regex.search(content):
                  utc_violations.append(relative)

          if utc_violations:
              print("错误：发现 UTC 相关禁用 API：")
              for item in sorted(set(utc_violations)):
                  print(f" - {item}")
              sys.exit(1)

          namespace_violations = []
          for cs_file in candidate_files:
              if cs_file.suffix != ".cs":
                  continue
              relative = cs_file.as_posix()
              if any(part in ignored_dirs for part in cs_file.parts):
                  continue
              text = cs_file.read_text(encoding="utf-8")
              match = re.search(r"^\s*namespace\s+([A-Za-z_][\w\.]*)\s*(?:;|\{)", text, re.MULTILINE)
              if not match:
                  continue
              actual_ns = match.group(1)

              relative_parent = cs_file.parent
              if relative_parent.as_posix() == ".":
                  continue

              parts = list(relative_parent.parts)
              if not parts:
                  continue

              if parts[0] in {".github"}:
                  continue

              expected_ns = ".".join(parts)
              if actual_ns != expected_ns:
                  namespace_violations.append((relative, actual_ns, expected_ns))

          if namespace_violations:
              print("错误：发现命名空间与物理目录不一致：")
              for file_path, actual, expected in namespace_violations:
                  print(f" - {file_path}: 实际={actual} 期望={expected}")
              sys.exit(1)
          
          host_server_dir_violations = []
          for path in candidate_files:
              relative = path.as_posix()
              if "EverydayChain.Hub.Host/Servers/" in relative:
                  host_server_dir_violations.append(relative)
          
          if host_server_dir_violations:
              print("错误：发现 Host 层使用 Servers 目录命名，必须统一为 Services：")
              for item in sorted(set(host_server_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)
          
          second_person_violations = []
          for path in candidate_files:
              if path.suffix != ".cs":
                  continue
              relative = path.as_posix()
              if any(part in ignored_dirs for part in path.parts):
                  continue
              try:
                  content = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              # 仅检查 C# 代码注释；该规则基于正则近似匹配，不做完整语法解析。
              if second_person_inline_comment_pattern.search(content):
                  second_person_violations.append(relative)
                  continue
              if second_person_block_comment_pattern.search(content):
                  second_person_violations.append(relative)
          
          if second_person_violations:
              print("错误：发现注释中包含第二人称（你/你们）：")
              for item in sorted(set(second_person_violations)):
                  print(f" - {item}")
              sys.exit(1)

          config_array_sample_violations = []
          config_files = [path for path in candidate_files if re.match(r".*/appsettings.*\.json$", path.as_posix())]
          for config_path in config_files:
              relative = config_path.as_posix()
              try:
                  content = config_path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              # 逐字符移除 JSON 行注释，仅删除字符串字面量之外的 `//` 注释片段。
              # raw_line: 原始配置行文本。
              # 返回值: 去除行注释后的文本（若无注释则返回原文本）。
              def strip_json_line_comment(raw_line):
                  """移除 JSON 行注释，仅删除字符串字面量外部的 `//`。

                  Args:
                      raw_line: 原始配置行文本。

                  Returns:
                      去除行注释后的文本；未命中注释时返回原文本。
                  """
                  in_string = False
                  escaped = False
                  index = 0
                  length = len(raw_line)
                  while index < length:
                      ch = raw_line[index]
                      if escaped:
                          escaped = False
                          index += 1
                          continue
                      if ch == "\\":
                          escaped = True
                          index += 1
                          continue
                      if ch == '"':
                          in_string = not in_string
                          index += 1
                          continue
                      if not in_string and ch == "/" and index + 1 < length and raw_line[index + 1] == "/":
                          return raw_line[:index]
                      index += 1
                  return raw_line

              stripped_lines = []
              pending_comments = []
              for line in content.splitlines():
                  pure = strip_json_line_comment(line)
                  stripped_lines.append(pure)
                  s = line.strip()
                  if s.startswith("//"):
                      pending_comments.append(s)
                      continue
                  if s == "" or s in {"{", "}", "[", "]"}:
                      continue
                  if ":" in pure:
                      is_property = bool(re.match(r'^\s*\"[^\"]+\"\s*:', pure))
                      if is_property:
                          key_match = re.match(r'^\s*\"([^\"]+)\"\s*:', pure)
                          key_name = key_match.group(1) if key_match else ""
                          if not pending_comments:
                              print(f"错误：配置项缺少上方注释：{relative} -> {key_name}")
                              sys.exit(1)
                  pending_comments = []

              uncommented = "\n".join(stripped_lines)
              try:
                  data = json.loads(uncommented)
              except json.JSONDecodeError:
                  print(f"错误：配置文件在去除注释后无法解析 JSON：{relative}")
                  sys.exit(1)

              def walk_array(node, current_path):
                  if isinstance(node, dict):
                      for key, value in node.items():
                          walk_array(value, current_path + [key])
                  elif isinstance(node, list):
                      if not node:
                          full_path = ".".join(current_path) if current_path else "<root>"
                          config_array_sample_violations.append(f"{relative}: 集合 {full_path} 不能为空，至少需要一个示例元素")
                          return
                      for item in node:
                          walk_array(item, current_path)

              walk_array(data, [])

          if config_array_sample_violations:
              print("错误：发现集合配置项缺少示例元素：")
              for item in config_array_sample_violations:
                  print(f" - {item}")
              sys.exit(1)

          enum_dir_violations = []
          option_dir_violations = []
          aggregate_dir_violations = []
          event_dir_violations = []
          utility_dir_violations = []

          for path in candidate_files:
              if path.suffix != ".cs":
                  continue
              relative = path.as_posix()
              if any(part in ignored_dirs for part in path.parts):
                  continue
              text = path.read_text(encoding="utf-8")
              class_matches = re.findall(r"\b(class|record|record\s+struct)\s+([A-Za-z_][A-Za-z0-9_]*)", text)
              enum_matches = re.findall(r"\benum\s+([A-Za-z_][A-Za-z0-9_]*)", text)

              if enum_matches and not relative.startswith("EverydayChain.Hub.Domain/Enums/"):
                  enum_dir_violations.append(relative)

              if class_matches:
                  if relative.endswith("Options.cs") and not relative.startswith("EverydayChain.Hub.Domain/Options/"):
                      option_dir_violations.append(relative)

                  for _, type_name in class_matches:
                      is_entity_outside_aggregates = (
                          type_name.endswith("Entity")
                          and relative.startswith("EverydayChain.Hub.Domain/")
                          and "/Aggregates/" not in relative
                      )
                      if is_entity_outside_aggregates:
                          aggregate_dir_violations.append(relative)
                      if type_name.endswith("Event") and not relative.startswith("EverydayChain.Hub.Domain/Events/"):
                          event_dir_violations.append(relative)

              static_class_matches = re.findall(r"\bpublic\s+static\s+class\s+([A-Za-z_][A-Za-z0-9_]*)", text)
              for type_name in static_class_matches:
                  if type_name.endswith(("Utility", "Utilities", "Helper", "Builder", "Filter")):
                      if not relative.startswith("EverydayChain.Hub.SharedKernel/Utilities/"):
                          utility_dir_violations.append(relative)

          if enum_dir_violations:
              print("错误：发现枚举未定义在 EverydayChain.Hub.Domain.Enums：")
              for item in sorted(set(enum_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)

          if option_dir_violations:
              print("错误：发现配置实体未定义在 EverydayChain.Hub.Domain.Options：")
              for item in sorted(set(option_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)

          if aggregate_dir_violations:
              print("错误：发现聚合根未定义在 Aggregates 子目录：")
              for item in sorted(set(aggregate_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)

          if event_dir_violations:
              print("错误：发现事件未定义在 EverydayChain.Hub.Domain.Events：")
              for item in sorted(set(event_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)

          if utility_dir_violations:
              print("错误：发现静态工具类未定义在 EverydayChain.Hub.SharedKernel.Utilities：")
              for item in sorted(set(utility_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)

          repository_dir_violations = []
          for path in candidate_files:
              if path.suffix != ".cs":
                  continue
              relative = path.as_posix()
              if any(part in ignored_dirs for part in path.parts):
                  continue
              if "/Repositories/" in relative and relative.startswith("EverydayChain.Hub.Application/"):
                  repository_dir_violations.append(relative)

          if repository_dir_violations:
              print("错误：发现 Application 层仓储抽象放置在 Repositories 目录，必须迁移至 Abstractions/Persistence：")
              for item in sorted(set(repository_dir_violations)):
                  print(f" - {item}")
              sys.exit(1)

          print("治理规则检查通过。")
          PY
